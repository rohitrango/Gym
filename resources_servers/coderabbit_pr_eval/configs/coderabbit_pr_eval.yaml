coderabbit_pr_eval:
  resources_servers:
    coderabbit_pr_eval:
      entrypoint: app.py
      domain: coding
      judge_score_threshold: 4.0
      # --- Judge configuration ---
      # Two judge modes are supported:
      #
      # 1. External judge (recommended): Set judge_external_base_url and
      #    judge_external_model to use any OpenAI-compatible API as the judge.
      #    Set the API key via the env var named in judge_external_api_key_env
      #    (default: JUDGE_API_KEY).  Example:
      #      export JUDGE_API_KEY="your-api-key"
      #
      # 2. Internal judge (fallback): If judge_external_base_url is NOT set,
      #    the server falls back to judge_model_server, which routes judge
      #    requests through a NeMo Gym responses_api_model (e.g. the policy
      #    model or a separate model server defined in the config).
      #
      # Internal judge fallback (used only when judge_external_base_url is unset)
      judge_model_server:
        type: responses_api_models
        name: policy_model
      judge_responses_create_params:
        input: []
      judge_prompt_template_fpath: prompt_templates/pr_summary_judge.txt
      judge_endpoint_max_concurrency: 16
      # External judge (takes precedence when set)
      judge_external_base_url: "https://inference-api.nvidia.com/v1"
      judge_external_model: "aws/anthropic/bedrock-claude-opus-4-6"
      judge_external_api_key_env: "JUDGE_API_KEY"
      description: CodeRabbit PR summarization and review classification
      value: Improve PR summary quality and review triage accuracy
      verified: false
coderabbit_pr_eval_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: coderabbit_pr_eval
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: train
        type: train
        jsonl_fpath: resources_servers/coderabbit_pr_eval/data/train.jsonl
        num_repeats: 1
        gitlab_identifier:
          dataset_name: coderabbit_pr_eval
          version: 0.0.1
          artifact_fpath: train.jsonl
        license: Apache 2.0
      - name: validation
        type: validation
        jsonl_fpath: resources_servers/coderabbit_pr_eval/data/validation.jsonl
        num_repeats: 1
        gitlab_identifier:
          dataset_name: coderabbit_pr_eval
          version: 0.0.1
          artifact_fpath: validation.jsonl
        license: Apache 2.0
      - name: example
        type: example
        jsonl_fpath: resources_servers/coderabbit_pr_eval/data/example.jsonl
        num_repeats: 1
