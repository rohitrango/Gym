# Showcase: claude_code_agent against a NeMo Gym model server's /v1/messages (not Anthropic).
#
# Every Gym model server exposes /v1/messages (default Messages <-> Responses mapping on
# SimpleResponsesAPIModel). The agent's `model_server` ref resolves ANTHROPIC_BASE_URL to the
# model server; the CLI appends /v1/messages. Needs NO anthropic_* env vars.
#
# Compose with any model server as `policy_model`, e.g. a vLLM OpenAI-compatible endpoint:
#   ng_run "+config_paths=[\
#     resources_servers/reasoning_gym/configs/reasoning_gym_claude_code_agent_model_server.yaml,\
#     responses_api_models/vllm_model/configs/vllm_model.yaml]"
#   ng_collect_rollouts \
#     +agent_name=reasoning_gym_claude_code_agent_model_server \
#     +input_jsonl_fpath=resources_servers/reasoning_gym/data/example.jsonl \
#     +output_jsonl_fpath=claude_code_via_model_server_rollout.jsonl +limit=1

reasoning_gym:
  resources_servers:
    reasoning_gym:
      entrypoint: app.py
      domain: knowledge
      verified: false
      description: Claude Code agent harness for reasoning gym tasks, via a Gym model server's /v1/messages
      value: Showcase Claude Code running against any Gym model backend

reasoning_gym_claude_code_agent_model_server:
  responses_api_agents:
    claude_code_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: reasoning_gym
      model_server:
        type: responses_api_models
        name: policy_model
      concurrency: 32
      model: ${policy_model_name}
      anthropic_api_key: EMPTY  # pragma: allowlist secret
      anthropic_base_url: null
      max_turns: 30
      timeout: 300
      thinking: disabled
      system_prompt: |
        You are a precise reasoning assistant. You have access to Bash to run Python for calculations.
        For every problem: think step by step, use code to verify when helpful, and state your final answer clearly.
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/reasoning_gym/data/example.jsonl
