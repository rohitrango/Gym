    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: arena_hard_v2
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: validation
        type: validation
        jsonl_fpath: resources_servers/arena/data/arena_hard_v2/arena_hard_v2_validation.jsonl
        gitlab_identifier:
          dataset_name: arena_hard_v2
          version: 0.0.1
          artifact_fpath: arena_hard_v2_validation.jsonl
        license: TBD
      - name: example
        type: example
        jsonl_fpath: resources_servers/arena/data/arena_hard_v2/example.jsonl

judge_model:
  responses_api_models:
    vllm_model:
      entrypoint: app.py
      base_url: https://inference-api.nvidia.com/v1
      api_key: sk-***
      model: aws/anthropic/bedrock-claude-opus-4-6
      return_token_id_information: false
      uses_reasoning_parser: false
