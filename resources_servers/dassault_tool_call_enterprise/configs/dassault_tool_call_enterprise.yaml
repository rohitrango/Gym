dassault_tool_call_enterprise:
  resources_servers:
    dassault_tool_call_enterprise:
      entrypoint: app.py
      domain: agent
      description: Enterprise function calling benchmark with complex JSON Schema tool definitions

dassault_tool_call_enterprise_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      max_steps: 1
      resources_server:
        type: resources_servers
        name: dassault_tool_call_enterprise
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: enterprise
        type: validation
        jsonl_fpath: resources_servers/dassault_tool_call_enterprise/data/enterprise.jsonl
        gitlab_identifier:
          dataset_name: dassault_tool_call_enterprise
          version: 0.0.1
          artifact_fpath: enterprise.jsonl
        license: Apache 2.0
      - name: example
        type: example
        jsonl_fpath: resources_servers/dassault_tool_call_enterprise/data/example.jsonl
