mini_swe_agent_2:
  responses_api_agents:
    mini_swe_agent_2:
      entrypoint: app.py
      domain: coding
      description: Software engineering tasks driven by mini-swe-agent harness on OpenSandbox.
      value: Improve agentic software engineering capabilities.
      model_server:
        type: responses_api_models
        name: policy_model
      concurrency: 64
      env: sandbox
      sandbox_provider:
        opensandbox:
          connection:
            domain: opensandbox-server.opensandbox-system.svc.cluster.local
            api_key: ${oc.env:OPENSANDBOX_API_KEY}
            protocol: http
            request_timeout_s: 300
            use_server_proxy: true
          create:
            request_timeout_s: 1200
            timeout_s: 1200
            skip_health_check: true
            retries: 10
            retry_delay_s: 5.0
            retry_max_delay_s: 90.0
          probe:
            timeout_s: 60
            deadline_s: 180
            stable_count: 2
            stable_delay_s: 1.0
          operations:
            retries: 5
            retry_delay_s: 1.0
            retry_max_delay_s: 45.0
            command_retries: 0
            close_timeout_s: 30
      sandbox_spec:
        ttl_s: 18000
        ready_timeout_s: 1200
        resources:
          cpu: 2
          memory_mib: 8192
          disk_gib: 20
        provider_options:
          platform:
            os: linux
            arch: amd64
        metadata:
          benchmark: swebench-verified
          harness: mini-swe-agent
          sandbox-api: opensandbox-sdk
      sandbox_environment_kwargs:
        cwd: /testbed
        conda_env: testbed
        activate_conda: true
        user: root
      run_golden: false
      step_timeout: 600
      eval_timeout: 1800
      skip_if_exists: false
      step_limit: 250
