opencode_agent:
  responses_api_agents:
    opencode_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: ???
      concurrency: 8
      command: opencode
      model: nvinf/nvidia/qwen/qwen3-next-80b-a3b-instruct
      openai_api_key: ""
      openai_base_url: null
      env: {}
      workspace_root: outputs/opencode_agent/workspaces
      thinking: false
      system_prompt: null
      setup_timeout: 900
      timeout: 900
      extra_args: []
      # written to opencode.json in the run dir
      opencode_config:
        permission:
          bash: allow
          edit: allow
          webfetch: allow
        provider:
          nvinf:
            npm: "@ai-sdk/openai-compatible"
            options:
              baseURL: https://integrate.api.nvidia.com/v1
              apiKey: ${nvidia_api_key}
            models:
              nvidia/qwen/qwen3-next-80b-a3b-instruct: {}
      opencode_version: 1.17.11
